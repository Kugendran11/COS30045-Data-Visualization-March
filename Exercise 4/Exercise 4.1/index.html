<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4: SVG House and Garden</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        svg {
            background-color: #87CEEB; /* Sky Blue Background */
            border: 2px solid #333;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>Exercise 4: SVG House & Garden</h1>

    <svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
        
        <rect x="0" y="400" width="800" height="200" fill="#2ecc71" />
        <polygon points="350,600 450,600 420,400 380,400" fill="#e67e22" />

        <circle cx="100" cy="100" r="50" fill="#f1c40f" stroke="#f39c12" stroke-width="4" />

        <rect x="230" y="170" width="40" height="80" fill="#7f8c8d" stroke="#34495e" stroke-width="2" />
        <rect x="250" y="250" width="300" height="200" fill="#e74c3c" stroke="#c0392b" stroke-width="3" />
        <polygon points="220,250 580,250 400,120" fill="#34495e" />
        <rect x="370" y="330" width="60" height="120" fill="#d35400" />
        <circle cx="420" cy="390" r="5" fill="#f1c40f" />

        <g fill="#ffffff" stroke="#2980b9" stroke-width="4">
            <rect x="280" y="280" width="50" height="50" />
            <rect x="470" y="280" width="50" height="50" />
        </g>

        <text x="400" y="80" font-family="sans-serif" font-size="24" fill="#2c3e50" text-anchor="middle">My SVG Dream Home</text>
        <text x="10" y="590" font-family="monospace" font-size="12" fill="#ffffff">Coordinate Origin (0,0) is Top-Left</text>

    </svg>

</body>
</html>
